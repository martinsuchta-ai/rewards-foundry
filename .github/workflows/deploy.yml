name: Deploy to SiteGround (rewards-foundry.com)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS
        # Explicit FTPS over port 21 (AUTH TLS) — what SG shared
        # hosting actually offers. The implicit-FTPS ftps:// scheme
        # tries port 990 which SG does not expose; that bit us during
        # the Affiliate + TGF setups. Use ftp:// + force SSL via lftp
        # directives.
        #
        # Mirror source: ./public/ + ./api/
        #   → /rewards-foundry.com/public_html/  (addon-domain webroot)
        #
        # NOTE on target path: rewards-foundry.com is an addon domain
        # on Marty's primary SG account, so the webroot is
        # /rewards-foundry.com/public_html/. If anyone re-runs this
        # on a fresh stand-alone account (primary domain), the webroot
        # would be /public_html/ instead. Check via FileZilla BEFORE
        # blaming the workflow.
        #
        # Two top-level dirs ship: public/ (static + redeem.html + the
        # admin UI under public/admin/) and api/ (PHP endpoints +
        # migrations). app/ was scaffolded as a placeholder but admin-
        # under-public gives cleaner URLs (/admin/login vs /app/admin/login),
        # so the mirror skips it.
        run: |
          lftp -d -e "
            set ftp:ssl-force yes;
            set ftp:ssl-protect-data yes;
            set ssl:verify-certificate no;
            open -u '${{ secrets.SG_USER }}','${{ secrets.SG_PASS }}' ftp://${{ secrets.SG_HOST }};
            mirror -R --no-perms --delete --verbose \
              -X .git/ \
              -X .github/ \
              -X .vscode/ \
              -X .claude/ \
              -X node_modules/ \
              -X README.md \
              -X CLAUDE.md \
              -X .gitignore \
              ./public/ /rewards-foundry.com/public_html/;
            mirror -R --no-perms --delete --verbose \
              -X .git/ -X .github/ -X .vscode/ -X .claude/ \
              ./api/ /rewards-foundry.com/public_html/api/;
            pwd;
            cls -la /rewards-foundry.com/public_html/;
            bye
          "
