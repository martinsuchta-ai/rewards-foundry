<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Sign in · Rewards Foundry admin</title>
<link rel="stylesheet" href="/admin/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Rewards Foundry</h1>
      <p>Sign in to manage reward items + view redemption analytics.</p>

      <div id="login-err" class="login-err"></div>

      <div class="login-row">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="username" autofocus>
      </div>
      <div class="login-row">
        <label for="login-pwd">Password</label>
        <input id="login-pwd" type="password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%">Sign in</button>
    </div>
  </div>

<script src="/admin/shell.js"></script>
<script>
(function () {
  var emailEl = document.getElementById('login-email');
  var pwdEl   = document.getElementById('login-pwd');
  var errEl   = document.getElementById('login-err');
  var btn     = document.getElementById('login-btn');

  function showErr(msg) { errEl.textContent = msg || ''; }
  function doLogin() {
    var email = (emailEl.value || '').trim();
    var pwd   = pwdEl.value || '';
    if (!email || !pwd) { showErr('Email and password are required.'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…'; showErr('');
    RF.api('/api/admin/auth.php?action=login', {
      method: 'POST',
      body: JSON.stringify({ email: email, password: pwd })
    }).then(function (res) {
      btn.disabled = false; btn.textContent = 'Sign in';
      if (res.status === 429) {
        showErr(((res.body && res.body.error) || 'Too many attempts')); return;
      }
      if (res.status === 401 || !res.body || !res.body.ok) {
        showErr(((res.body && res.body.error) || 'Sign-in failed.'));
        return;
      }
      RF.setSession(res.body.session_token, res.body.expires_at);
      window.location.href = '/admin/';
    }).catch(function () {
      btn.disabled = false; btn.textContent = 'Sign in';
      showErr('Network error. Try again.');
    });
  }
  btn.addEventListener('click', doLogin);
  [emailEl, pwdEl].forEach(function (el) {
    el.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
  });

  /* If there's already a valid session, skip the login form. */
  RF.api('/api/admin/auth.php?action=probe').then(function (res) {
    if (res.body && res.body.ok) window.location.href = '/admin/';
  }).catch(function () { /* fine, show login */ });
})();
</script>
</body>
</html>
